version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - DATA_MODE=${DATA_MODE:-sample}
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs
    command: >
      sh -c "python -m core.pipeline --mode sample &&
             streamlit run app.py --server.port 8501 --server.address 0.0.0.0
             --server.headless true --browser.gatherUsageStats false"
